name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          if [ -n "$(gofmt -l cmd)" ]; then
            echo "These files need formatting (run: make fmt):"
            gofmt -l cmd
            exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
