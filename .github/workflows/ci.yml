name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l cmd)" || (gofmt -l cmd; echo 'run: make fmt'; exit 1)
      - run: go vet ./...
      - run: go build ./...
